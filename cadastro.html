<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERBERUS — Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo-mark">KER<span>BE</span>RUS</div>
      <div class="logo-sub">Formula 1 Intelligence</div>
    </div>

    <div class="accent-line" style="margin: 0 auto 28px;"></div>

    <div class="auth-title">Criar Conta</div>
    <div class="auth-sub">Preencha os dados para se registrar</div>

    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" class="form-input" placeholder="Seu nome" id="nome" />
    </div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" placeholder="seu@email.com" id="email" />
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" placeholder="••••••••" id="senha" />
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;" onclick="handleCadastro()">
      Criar Conta
    </button>

    <div class="auth-footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>

  </div>
</div>

<script>
  function handleCadastro() {
    const nome  = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    if (!nome || !email || !senha) {
      alert('Preencha todos os campos.');
      return;
    }

    fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email, senha })
    })
    .then(r => {
      if (!r.ok) throw new Error('Erro ao criar usuário');
      return r.json();
    })
    .then(data => {
      alert('Usuário criado com sucesso!');
      window.location.href = 'login.html';
    })
    .catch(err => {
      console.error(err);
      alert('Erro ao criar usuário: ' + err.message);
    });
  }
</script>

</body>
</html>
