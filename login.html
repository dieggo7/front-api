<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERBERUS — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo-mark">KER<span>BE</span>RUS</div>
      <div class="logo-sub">Formula 1 Intelligence</div>
    </div>

    <div class="accent-line" style="margin: 0 auto 28px;"></div>

    <div class="auth-title">Acesso</div>
    <div class="auth-sub">Entre com suas credenciais para continuar</div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" placeholder="seu@email.com" id="email" />
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" placeholder="••••••••" id="senha" />
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;" onclick="handleLogin()">
      Entrar
    </button>

    <div class="auth-footer">
      Não tem conta? <a href="cadastro.html">Criar conta</a>
    </div>

  </div>
</div>

<script>
  function handleLogin() {
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    if (!email || !senha) {
      alert('Preencha todos os campos.');
      return;
    }

    fetch('/api/users/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    })
    .then(r => {
      if (!r.ok) throw new Error('Email ou senha incorretos');
      return r.json();
    })
    .then(data => {
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      alert('Login realizado com sucesso!');
      window.location.href = 'dashboard.html';
    })
    .catch(err => {
      console.error(err);
      alert('Erro ao fazer login: ' + err.message);
    });
  }
</script>

</body>
</html>
